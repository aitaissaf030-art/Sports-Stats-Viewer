<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sports Stats Viewer</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
  padding: 0;
}

header {
  background: #1e293b;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.tabs {
  display: flex;
  justify-content: center;
  margin: 15px;
}

button {
  background: #334155;
  color: white;
  border: none;
  padding: 10px 15px;
  margin: 5px;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #475569;
}

.card {
  background: #1e293b;
  margin: 15px;
  padding: 15px;
  border-radius: 12px;
}

.search {
  text-align: center;
  margin: 15px;
}

input {
  padding: 8px;
  border-radius: 6px;
  border: none;
  width: 70%;
}

</style>
</head>

<body>

<header>Sports Stats Viewer</header>

<div class="search">
  <input type="text" id="searchBox" placeholder="Search player...">
  <button onclick="searchPlayer()">Search</button>
</div>

<div class="tabs">
  <button onclick="showSport('football')">Football</button>
  <button onclick="showSport('cricket')">Cricket</button>
  <button onclick="showSport('basketball')">Basketball</button>
</div>

<div id="content"></div>

<script>

const data = {
  football: [
    {name:"Player A", stat:"28 Goals"},
    {name:"Player B", stat:"22 Goals"}
  ],
  cricket: [
    {name:"Player C", stat:"Average 62.4"},
    {name:"Player D", stat:"Economy 3.8"}
  ],
  basketball: [
    {name:"Player E", stat:"34.5 PPG"},
    {name:"Player F", stat:"29.1 PPG"}
  ]
};

function showSport(sport){
  const container = document.getElementById("content");
  container.innerHTML = "";

  data[sport].forEach(player => {
    container.innerHTML += `
      <div class="card">
        <h3>${player.name}</h3>
        <p>${player.stat}</p>
      </div>
    `;
  });
}

function searchPlayer(){
  const query = document.getElementById("searchBox").value.toLowerCase();
  const container = document.getElementById("content");
  container.innerHTML = "";

  Object.values(data).flat().forEach(player => {
    if(player.name.toLowerCase().includes(query)){
      container.innerHTML += `
        <div class="card">
          <h3>${player.name}</h3>
          <p>${player.stat}</p>
        </div>
      `;
    }
  });
}

showSport('football');

</script>

</body>
</html>
