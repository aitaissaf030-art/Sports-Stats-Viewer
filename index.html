<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sports Stats Viewer</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      padding: 20px;
    }
    h1 { color: #00ffcc; }
    .card {
      background: #1e1e1e;
      margin: 15px;
      padding: 15px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h1>Sports Stats Viewer</h1>

<div class="card">
  <h3>Football</h3>
  <p>Top Scorer: 28 Goals</p>
  <p>Best Team Win Rate: 78%</p>
</div>

<div class="card">
  <h3>Basketball</h3>
  <p>Top Points: 34.5 PPG</p>
  <p>Best Team Accuracy: 49%</p>
</div>

<div class="card">
  <h3>Cricket</h3>
  <p>Top Batsman Avg: 62.4</p>
  <p>Best Bowler Economy: 3.8</p>
</div>

</body>
</html>
