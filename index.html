<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sports Records & History</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  margin:0;
}
header{
  background:#1e293b;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}
.tabs{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  margin:10px;
}
button{
  background:#334155;
  color:white;
  border:none;
  padding:8px 12px;
  margin:5px;
  border-radius:8px;
  cursor:pointer;
}
button:hover{
  background:#475569;
}
.card{
  background:#1e293b;
  margin:12px;
  padding:12px;
  border-radius:10px;
}
input{
  padding:7px;
  width:70%;
  border-radius:6px;
  border:none;
}
.search{
  text-align:center;
  margin:10px;
}
</style>
</head>

<body>

<header>Sports Records & History</header>

<div class="search">
  <input type="text" id="searchBox" placeholder="Search year, team or player">
  <button onclick="searchData()">Search</button>
</div>

<div class="tabs">
  <button onclick="showSection('football')">Football</button>
  <button onclick="showSection('cricket')">Cricket</button>
  <button onclick="showSection('basketball')">Basketball</button>
</div>

<div id="content"></div>

<script>

const database = {
football:[
"1930 - Uruguay (World Cup Winner)",
"1934 - Italy (World Cup Winner)",
"1958 - Brazil (World Cup Winner)",
"2002 - Brazil (World Cup Winner)",
"2018 - France (World Cup Winner)",
"2022 - Argentina (World Cup Winner)",
"All-Time Top Scorer: Cristiano Ronaldo (International Goals Record)"
],
cricket:[
"1975 - West Indies (World Cup Winner)",
"1983 - India (World Cup Winner)",
"1999 - Australia (World Cup Winner)",
"2011 - India (World Cup Winner)",
"2019 - England (World Cup Winner)",
"Highest ODI Runs: Sachin Tendulkar (18426)",
"Fastest ODI Century: AB de Villiers (31 balls)"
],
basketball:[
"1996 - Chicago Bulls (NBA Champions)",
"2001 - Los Angeles Lakers (NBA Champions)",
"2016 - Cleveland Cavaliers (NBA Champions)",
"2020 - LA Lakers (NBA Champions)",
"All-Time Points Leader: LeBron James",
"Most NBA Championships (Player): Bill Russell"
]
};

function showSection(section){
  const container = document.getElementById("content");
  container.innerHTML = "";
  database[section].forEach(item=>{
    container.innerHTML += `<div class="card">${item}</div>`;
  });
}

function searchData(){
  const query = document.getElementById("searchBox").value.toLowerCase();
  const container = document.getElementById("content");
  container.innerHTML = "";

  Object.values(database).flat().forEach(item=>{
    if(item.toLowerCase().includes(query)){
      container.innerHTML += `<div class="card">${item}</div>`;
    }
  });
}

showSection('football');

</script>

</body>
</html>
